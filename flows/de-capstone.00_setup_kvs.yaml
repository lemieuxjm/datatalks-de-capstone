id: 00_setup_kvs
namespace: de-capstone

tasks:
  - id: gcp_project_id
    type: io.kestra.plugin.core.kv.Set
    key: GCP_PROJECT_ID
    kvType: STRING
    value: datatalks-de-capstone

  - id: gcp_location
    type: io.kestra.plugin.core.kv.Set
    key: GCP_LOCATION
    kvType: STRING
    value: us-central1

  - id: gcp_bucket_name
    type: io.kestra.plugin.core.kv.Set
    key: GCP_BUCKET_NAME
    kvType: STRING
    value: capstone-bucket-lemieuxjm-2026

  - id: gcp_dataset_raw
    type: io.kestra.plugin.core.kv.Set
    key: GCP_DATASET_RAW
    kvType: STRING
    value: capstone_raw  # raw dataset name 

  - id: gcp_dataset_silver
    type: io.kestra.plugin.core.kv.Set
    key: GCP_DATASET_SILVER
    kvType: STRING
    value: capstone_silver # silver dataset name

  - id: gcp_dataset_gold
    type: io.kestra.plugin.core.kv.Set
    key: GCP_DATASET_GOLD
    kvType: STRING
    value: capstone_gold # gold dataset name

  - id: dbt_cloud_api_token
    type: io.kestra.plugin.core.kv.Set
    key: DBT_CLOUD_API_TOKEN
    kvType: STRING
    value: dbtc_DS-0M_oEMKWYNTRXe-KpAhOz0Q_QDPB-91A5WLLksw4GjCwJfk
