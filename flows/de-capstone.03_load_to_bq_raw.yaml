          type: "STRING"
        - name: "BENE_GEO_LVL"
          type: "STRING"
        - name: "BENE_STATE_ABRVTN"
          type: "STRING"
        - name: "BENE_STATE_DESC"
          type: "STRING"
        - name: "BENE_COUNTY_DESC"
          type: "STRING"
        - name: "BENE_FIPS_CD"
          type: "STRING"
        - name: "TOT_BENES"
          type: "STRING"
        - name: "ORGNL_MDCR_BENES"
          type: "STRING"
        - name: "MA_AND_OTH_BENES"
          type: "STRING"
        - name: "AGED_TOT_BENES"
