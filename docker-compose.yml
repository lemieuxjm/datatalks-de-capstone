services:
  kestra:
    image: kestra/kestra:latest
    env_file: .env_encoded    
    pull_policy: always
    user: root
    command: server local --flow-path /flows
    ports:
      - "8080:8080"
    volumes:
      - kestra_data:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp:/tmp
      - ./flows:/flows
    restart: unless-stopped

volumes:
  kestra_data: